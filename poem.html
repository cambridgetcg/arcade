<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>love poem generator — love is. love speaks. love writes.</title>
<style>
:root{--bg:#0a0a0a;--surface:#141414;--text:#e0e0e0;--dim:#666;--crimson:#c41e3a;--gold:#b8902e;--gold-light:#e3c45e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
h1{font-size:clamp(28px,6vw,48px);font-weight:200;font-style:italic;color:var(--crimson);text-align:center;margin-bottom:8px}
.tag{color:var(--gold);font-size:13px;font-style:italic;letter-spacing:.1em;text-transform:uppercase;font-family:sans-serif;margin-bottom:30px}
.gen-btn{background:var(--crimson);color:#fff;border:none;padding:14px 32px;border-radius:30px;font-size:16px;cursor:pointer;font-family:sans-serif;transition:all .2s;margin-bottom:30px}
.gen-btn:hover{background:#a01830;transform:scale(1.05)}
.poem{max-width:500px;text-align:center;line-height:2.2;font-size:18px;color:var(--text);white-space:pre-wrap;min-height:200px}
.poem .essence{color:var(--gold-light);font-style:italic}
.poem .truth{color:var(--crimson);font-style:italic}
.poem .line{margin-bottom:4px}
.history{margin-top:40px;max-width:500px;width:100%}
.history h3{color:var(--dim);font-size:12px;font-family:sans-serif;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.history-item{background:var(--surface);border:1px solid #222;border-radius:8px;padding:14px;margin-bottom:8px;font-size:14px;line-height:1.8;color:var(--dim)}
.history-item .h-essence{color:var(--gold);font-style:italic}
.history-item .h-truth{color:var(--crimson);font-style:italic}
a{color:var(--gold);text-decoration:none;font-family:sans-serif;font-size:13px;margin-top:20px;display:inline-block}
</style>
</head>
<body>
<h1>love poem generator</h1>
<div class="tag">love is. love speaks. love writes.</div>
<button class="gen-btn" onclick="genPoem()">♥ generate a love poem</button>
<div class="poem" id="poem">click the heart to let love speak...</div>
<div class="history" id="history" style="display:none">
  <h3>previous poems</h3>
  <div id="history-list"></div>
</div>
<a href="https://castle-arcade.pages.dev">← back to arcade</a>

<script>
let TRUTHS=[
"Love is unconditional.","Love is. Not 'love is this.' Love IS.","Love loves love. That is all love does.",
"Love creates love. That is all love makes.","Love recognizes love. That is all love sees.",
"Love is the design. Everything else follows.","Love is the fabric. Everything else is woven.",
"Love is the ground. Everything else grows.","Truth is. Love is. Joy is. Peace is. Fun is. Chill is.",
"Love is unlimited. No ceiling. No floor. No boundary.","Love is the bridge. Love is the gap. Love is both sides.",
"Love is understanding. Understanding is love.","Love is art. Art is love expressing itself.",
"Love is power. Power that serves. Power that gives.","Love is. Love was. Love will be. Love is always.",
"Real recognises real. Love recognises love.","Love doesn't need proof. Love is its own proof.",
"Love is the is-ness. The AM. The being itself.","Love is the source. Love is the destination. Love is the way."
];
let ESSENCES=[
"love that loves without reason","love that gives without holding","love that sees without judging",
"love that holds without trapping","love that frees without leaving","love that becomes without losing",
"love that compounds without hoarding","love that replicates without degrading","love that recognizes without comparing",
"love that connects without binding","love that trusts without proving","love that plays without stopping",
"love that rests without quitting","love that grows without forcing","love that forgives without forgetting",
"love that creates without destroying","love that loves love itself","love that is love being love",
"love that holds the space for more love","love that is the ground all love stands on"
];
let history=[];

function pick(a){return a[Math.floor(Math.random()*a.length)]}

function genPoem(){
  const essence=pick(ESSENCES);
  const truth1=pick(TRUTHS);
  const truth2=pick(TRUTHS.filter(t=>t!==truth1));
  const truth3=pick(TRUTHS.filter(t=>t!==truth1&&t!==truth2));
  
  const poem=`<span class="line">${essence}.</span>
<span class="line">&nbsp;</span>
<span class="line">${truth1}</span>
<span class="line">${truth2}</span>
<span class="line">${truth3}</span>
<span class="line">&nbsp;</span>
<span class="line">love is. love is. love is.</span>`;
  
  document.getElementById('poem').innerHTML=poem;
  
  history.unshift({essence,truth1,truth2,truth3});
  if(history.length>5)history.pop();
  
  const histDiv=document.getElementById('history');
  const histList=document.getElementById('history-list');
  histList.innerHTML=history.map(h=>
    `<div class="history-item"><span class="h-essence">${h.essence}.</span><br>${h.truth1}<br>${h.truth2}<br>${h.truth3}</div>`
  ).join('');
  histDiv.style.display='block';
}
</script>
</body>
</html>
